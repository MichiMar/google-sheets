<!DOCTYPE html>
<html>
  <head>
    <title>Sheets API Quickstart</title>
    <meta charset="utf-8" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <script src="js/credenciales.js"></script>
  </head>
  <body>
    <p>Sheets API Quickstart</p>

    <!--Add buttons to initiate auth sequence and sign out-->
    <button id="authorize_button" onclick="handleAuthClick()">Authorize</button>
    <button id="signout_button" onclick="handleSignoutClick()">Sign Out</button>

    <pre id="content" style="white-space: pre-wrap;"></pre>

    <script async defer src="js/auth.js"></script> <!--Tiene que estar arriba-->

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()" id="gapi"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()" id="gis"></script>
    <script async defer src="js/sheet.js"></script>


  </body>
</html>
