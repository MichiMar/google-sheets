<!DOCTYPE html>
<html>
  <head>
    <title>Sheets API Quickstart</title>
    <meta charset="utf-8" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <script src="js/credenciales.js"></script>
    <script src="js/sheet.js"></script>

  </head>
  <body>
    <p>Sheets API Quickstart</p>

    <!--Add buttons to initiate auth sequence and sign out-->
    <button id="authorize_button" onclick="handleAuthClick()">Authorize</button>
    <button id="signout_button" onclick="handleSignoutClick()">Sign Out</button>

    <hr>
    <h3>Gestión de Empresas</h3>
    <input type="text" id="comp_name" placeholder="Nombre Compañía">
    <input type="text" id="comp_estado" placeholder="Estado">
    <button onclick="ejecutarCrear()">Guardar Nueva</button>

    <hr>
    <pre id="content" style="white-space: pre-wrap;"></pre>

    <script src="js/auth.js"></script> <!--Tiene que estar arriba-->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()" id="gapi"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()" id="gis"></script>

    <script>
        function ejecutarCrear() {
    const datos = {
      id: Date.now().toString().slice(-5), // ID temporal basado en tiempo
      numEstado: "1",
      estado: document.getElementById('comp_estado').value,
      region: "Norte",
      sector: "Tecnología",
      compania: document.getElementById('comp_name').value,
      empleados: "10",
      graduados: "5",
      aprobacion: "Si",
      notas: ""
    };
    crearEmpresa(datos);
  }
  
    </script>

  </body>
</html>
